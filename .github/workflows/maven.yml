name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build using Maven
      # Note: Since you're using --file, we point to the specific path
      run: mvn -B clean install --file cicd-demo/pom.xml

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@v1
      with:
        # You must tell the security action where the pom is too!
        directory-tree: cicd-demo
