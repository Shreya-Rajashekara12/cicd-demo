name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Grants necessary permissions for the Dependency Graph submission
permissions:
  contents: read
  security-events: write
  dependency-graph: write

jobs:
  build-and-scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: "Source: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Env: Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Build: Maven Clean Install"
        # We use 'working-directory' instead of '--file' for a cleaner Maven execution context
        run: mvn -B clean install
        working-directory: cicd-demo

      - name: "Security: Submit Dependency Graph"
        uses: advanced-security/maven-dependency-submission-action@v1
        with:
          directory: cicd-demo
