name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  dependency-graph: write

jobs:
  maven-build:
    name: Build and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: "Source: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Env: Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Build: Run Maven Install"
        run: mvn -B clean install --file cicd-demo/pom.xml

      - name: "Security: Update Dependency Graph"
        uses: advanced-security/maven-dependency-submission-action@v1
        with:
          directory: cicd-demo
