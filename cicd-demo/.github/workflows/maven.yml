name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          # This automatically caches your Maven dependencies
          cache: 'maven'

      - name: Build with Maven
        # Using -B (Batch Mode) is best practice for CI to reduce log noise
        run: mvn -B clean install
        working-directory: cicd-demo
